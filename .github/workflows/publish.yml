name: Publish to PyPI
# Publishes on every version tag (e.g. `git tag v0.1.0 && git push --tags`).
# Uses PyPI Trusted Publishing (OIDC) — no API token to store. Configure the
# publisher once at https://pypi.org/manage/account/publishing/ for this repo.
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
