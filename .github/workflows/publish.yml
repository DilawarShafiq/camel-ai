name: Publish to PyPI
# MANUAL trigger only. Camel AI installs from GitHub, so PyPI is optional.
# Note: the name "camel-ai" is already taken on PyPI by another project — to
# publish here, first change `name` in pyproject.toml to an available name and
# configure PyPI Trusted Publishing at
# https://pypi.org/manage/account/publishing/ for this repo.
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
