name: Publish to PyPI
# Publishes the `aicamel` package to PyPI. Manual trigger — run it once you've set
# up PyPI Trusted Publishing for this repo:
#   https://pypi.org/manage/account/publishing/
#   PyPI project: aicamel · Owner: DilawarShafiq · Repo: camel-ai
#   Workflow: publish.yml · Environment: pypi
# After that, run this workflow to publish. Then: pip install aicamel
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi         # must match the "Environment name" on PyPI
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
